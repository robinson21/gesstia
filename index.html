<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeSSTia - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-screen">
    <div class="login-container fade-in">
        <div class="logo">
            <!-- SVG Logo -->
            <svg class="logo-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" stroke="#3498db" stroke-width="3" fill="none"/>
                <path d="M30 50 L45 65 L70 35" stroke="#2ecc71" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <circle cx="50" cy="20" r="8" fill="#3498db"/>
                <rect x="42" y="28" width="16" height="20" fill="#3498db" opacity="0.3" rx="2"/>
            </svg>
            <h1>GeSSTia</h1>
            <p class="subtitle">Gestión Integral de Seguridad y Salud en el Trabajo</p>
        </div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="admin@losandes.cl" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" id="btn-login">
                Iniciar Sesión
            </button>
        </form>
        
        <div class="login-footer">
            <p><a href="#" id="forgot-link">¿Olvidaste tu contraseña?</a></p>
            <p class="version">v1.0.0 - Demo<br>
            <small style="color:var(--color-text-dim)">Credenciales: admin@losandes.cl / Demo1234!</small></p>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', doLogin);
    </script>
</body>
</html>
